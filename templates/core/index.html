<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Wikishelf</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Roboto+Slab:wght@100..900&display=swap');

        body {
            background-color: var(--bs-body-bg);
            color: var(--bs-body-color);
            font-family: 'Roboto Slab', serif;
        }
    </style>
</head>

<body>
    <nav class="navbar navbar-expand-lg border-bottom bg-white">
        <div class="container-fluid px-5">
            <a class="navbar-brand fw-semibold" href="#">
                <i class="bi bi-book-half text-dark fs-4"></i>
                Wikishelf
            </a>
            <div class="ms-auto d-flex gap-3">
                <a class="nav-link active" href="#">My Library</a>
                <a class="nav-link" href="#">Search</a>
            </div>
        </div>
    </nav>
    <!-- Main container -->
    <div class="container my-4">

        <!-- Search row -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="border rounded-3 bg-white p-2">
                    <div class="input-group">
                        <span class="input-group-text bg-white border-0 text-secondary"><i
                                class="bi bi-search"></i></span>
                        <input type="text" class="form-control border-0 py-2 shadow-none" placeholder="Search..."
                            style="outline: none; box-shadow: none;">
                        <button class="btn btn-outline-secondary border rounded-3 shadow-none" type="button"
                            style="outline: none; box-shadow: none;">Go</button>
                    </div>
                </div>
            </div>
        </div>

        <!-- Two column grid layout with borders only - no content filled -->
        <div class="row g-4">

            <!-- LEFT COLUMN: Search Results - empty grid with borders -->
            <div class="col-md-8">
                <div class="border rounded-3 p-3 bg-white h-100">
                    <div class="pb-2 mb-3">
                        <h5 class="mb-0">Search results</h5>
                    </div>
                    <!-- Empty grid container with border boxes (no cards, just structural rows/columns) -->
                    <div class="row g-3">
                        <!-- 3 empty column placeholders with borders only -->
                        <div class="col-md-6 col-lg-4">
                            <div class="border rounded-3 p-3" style="min-height: 120px;"></div>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <div class="border rounded-3 p-3" style="min-height: 120px;"></div>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <div class="border rounded-3 p-3" style="min-height: 120px;"></div>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <div class="border rounded-3 p-3" style="min-height: 120px;"></div>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <div class="border rounded-3 p-3" style="min-height: 120px;"></div>
                        </div>
                        <div class="col-md-6 col-lg-4">
                            <div class="border rounded-3 p-3" style="min-height: 120px;"></div>
                        </div>
                    </div>
                </div>
            </div>

            <!-- RIGHT COLUMN: My Collections - empty bordered area -->
            <div class="col-md-4">
                <div class="border rounded-3 p-3 bg-white h-100">
                    <div class="pb-2 mb-3">
                        <h5 class="mb-0">My Collections</h5>
                    </div>
                    <!-- Empty collection items with borders only -->
                    <div class="border rounded-3 p-3 mb-2" style="min-height: 60px;"></div>
                    <div class="border rounded-3 p-3 mb-2" style="min-height: 60px;"></div>
                    <div class="border rounded-3 p-3 mb-2" style="min-height: 60px;"></div>
                    <div class="border rounded-3 p-3 mt-3" style="min-height: 60px;"></div>
                </div>
            </div>
        </div>
    </div>
</body>

</html>
